<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netra | ChamaDash</title>
    <link rel="shortcut icon" href="static/images/faviconNetra.ico" type="image/x-icon">
    <link rel="stylesheet" href="static/style.css">
    <script src="static/script.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <main>
        <div class="mainDiv">
            <form method="post" enctype="multipart/form-data" id="uploadForm" accept=".csv, .slk, .xlsx">
                <label class="label-file-upload">
                    <input type="file" name="archive" id="fileInput">
                    <i class="fa-solid fa-upload" id="upload-icon"></i>
                    <span>
                        Segure e solte arquivos ou <b style="color: var(--button); text-decoration: underline 2px">Procure</b>.
                    </span>
                    <span class="grayText" id="selected_archive">Formatos suportados: .slk, .csv, .xlsx</span>
                </label>
                <button type="submit" class="submit-button">Enviar</button>
            </form>
        </div>
    </main>
    <div class="toastContainer">
        <i class="fa-solid" id="icon"></i>
        <span id="toastAdvise"></span>
    </div>
    <div class="dashboardContainer">
        <canvas class="grafico" id="graficoTipo"></canvas>
        <canvas class="grafico" id="graficoIncidentes"></canvas>
        <canvas class="grafico" id="graficoSolicitacoes"></canvas>
        <canvas class="grafico" id="graficoCategorias"></canvas>
        <canvas class="grafico" id="graficoSetores"></canvas>
        <canvas class="grafico" id="graficoTecnicos"></canvas>
        <canvas class="grafico" id="graficoSLA"></canvas>
    </div>
</body>

</html>
