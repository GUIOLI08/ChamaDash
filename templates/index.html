<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netra | Formatador</title>
    <link rel="shortcut icon" href="static/images/faviconNetra.ico" type="image/x-icon">
    <script src="static/script.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .caixa {
            border: 2px dashed #4F81BD;
            padding: 40px;
            border-radius: 10px;
            max-width: 500px;
            margin: 0 auto;
            background-color: #f9f9f9;
        }

        button {
            background-color: #244062;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
            font-size: 16px;
        }

        button:hover {
            background-color: #4F81BD;
        }
    </style>
</head>

<body>
    <div class="caixa">
        <h2>Formatador</h2>
        <p>Selecione o arquivo do GLPI (.csv, .xlsx ou .slk)</p>

        <form action="/upload" method="post" enctype="multipart/form-data" id="uploadForm" accept=".csv">
            <input type="file" name="arquivo" id="fileInput">
            <br>
            <button type="submit">Processar Dados</button>
        </form>
    </div>
</body>

</html>
